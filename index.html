<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Kakao 공유 테스트</title>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
</head>
<body>
  <button onclick="sendLink()" style="padding: 15px 30px; font-size: 16px;">
    카카오톡으로 공유
  </button>

  <script>
    // ✅ 1. SDK 초기화 (먼저)
    Kakao.init('ba4848b56b49c8826ad4113e55670941');

    // ✅ 2. 공유 함수
    function sendLink() {
      Kakao.Link.sendDefault({
        objectType: 'feed',
        content: {
          title: '뚜레쥬르',
          description: '스트로베리 케이크',
          imageUrl: 'https://lrl.kr/bCEko',
          link: {
            mobileWebUrl: 'https://dec433.github.io/Real/?url=https://open.kakao.com/o/sEZjJA6g',
            webUrl: 'https://dec433.github.io/Real/?url=https://open.kakao.com/o/sEZjJA6g',
          },
        },
        buttons: [
          {
            title: '선물 받기',
            link: {
              mobileWebUrl: 'https://dec433.github.io/Real/?url=https://www.youtube.com/watch?v=MxIual0m92U',
              webUrl: 'https://dec433.github.io/Real/?url=https://www.youtube.com/watch?v=MxIual0m92U',
            },
          },
        ],
      });
    }

    // ✅ 3. URL 파라미터 확인 (공유 후에만)
    window.addEventListener('load', function() {
      setTimeout(function() {
        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('url');
        if (redirectUrl) {
          window.location.href = redirectUrl;
        }
      }, 2000); // 2초 후 리다이렉트 (공유 완료 후)
    });
  </script>
</body>
</html>
