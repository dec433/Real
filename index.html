<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Kakao 공유 테스트</title>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <script>
    // ✅ 0. URL 파라미터 확인 후 자동 리다이렉트
    const params = new URLSearchParams(window.location.search);
    const redirectUrl = params.get('url');
    if (redirectUrl) {
      // 카카오 공유를 실행하지 않고 바로 이동해야 하는 경우
      if (!window.location.href.includes('kakaoShare')) {
        window.location.href = redirectUrl;
      }
    }

    // ✅ 1. Kakao SDK 초기화
    Kakao.init('fed4479e02adbd5483d097cc01e7b317');

    // ✅ 2. 공유 함수 정의
    function sendLink() {
      Kakao.Link.sendDefault({
        objectType: 'feed',
        content: {
          title: '튜토리얼 제외 모든 게임 가능',
          description: '아래 버튼 클릭',
          imageUrl: 'https://pack15.github.io/Roblox.jpg',
          link: {
            mobileWebUrl: 'https://pack15.github.io/?url=https://open.kakao.com/me/dlkff',
            webUrl: 'https://pack15.github.io/?url=https://open.kakao.com/me/dlkff',
          },
        },
        buttons: [
          {
            title: '구먜하러 가기',
            link: {
              mobileWebUrl: 'https://pack15.github.io/?url=https://open.kakao.com/me/dlkff',
              webUrl: 'https://pack15.github.io/?url=https://open.kakao.com/me/dlkff',
            },
          },
        ],
      });
    }
  </script>
</head>
<body>
  <button onclick="sendLink()">카카오톡으로 공유</button>
</body>
</html>
