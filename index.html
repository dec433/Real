<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Kakao 공유 테스트</title>
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <script>
    // ✅ Kakao SDK 초기화
    Kakao.init('e8e38a82f8a23fa041fd1b007e93770f');

    // ✅ 공유 함수 정의
    function sendLink() {
      Kakao.Link.sendDefault({
        objectType: 'feed',
        content: {
          title: '뚜레쥬르',
          description: '진한 우유 케이크 2호',
          imageUrl: 'https://dec433.github.io/Real/Milk.jpg',
          link: {
            mobileWebUrl: 'https://dec433.github.io/',
            webUrl: 'https://dec433.github.io/',
          },
        },
        buttons: [
          {
            title: '선물 받기',
            link: {
              mobileWebUrl: 'https://dec433.github.io/',
              webUrl: 'https://dec433.github.io/',
            },
          },
        ],
      });
    }
  </script>
</head>
<body>
  <button onclick="sendLink()">카카오톡으로 공유</button>
</body>
</html>
